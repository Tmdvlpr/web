port: 7880
rtc:
  tcp_port: 7881
  port_range_start: 50000
  port_range_end: 50500
  use_external_ip: true    # auto-detects VPS public IP for ICE candidates
  enable_web_transport: true   # QUIC/WebTransport — activates only with HTTPS/HTTP3

# Keys injected via LIVEKIT_KEYS env var: "APIkey: secret" (note space after colon)

webhook:
  api_key: API800d3a0bb564b340
  urls:
    - http://backend:8001/api/v1/internal/livekit/webhook

room:
  empty_timeout: 300
  max_participants: 50
  video_codecs: [H264]   # VP9/AV1 disabled — AMD GPU VP9 decoder produces green/magenta artifacts

redis:
  address: redis:6379

logging:
  level: info

turn:
  enabled: false    # enable later with real cert if UDP 50000-50500 is blocked by client firewalls

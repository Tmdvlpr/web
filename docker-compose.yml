services:
  backend:
    build:
      context: ./web/backend
      dockerfile: Dockerfile
    image: corpmeet-backend:dev
    container_name: corpmeet-backend-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:8051:8001"
    env_file:
      - web/backend/app/.env
    volumes:
      - ./data/chat-files:/app/data/chat-files
      - ./data/recordings:/app/data/recordings:ro
    networks:
      - corpmeet-dev
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  frontend:
    build:
      context: ./web/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?required}
    image: corpmeet-frontend:dev
    container_name: corpmeet-frontend-dev
    restart: unless-stopped
    ports:
      - "127.0.0.1:3051:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - corpmeet-dev
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  livekit:
    image: livekit/livekit-server:latest
    container_name: corpmeet-livekit-dev
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7882:7880"
      - "7883:7881"
      - "50501-51000:50501-51000/udp"
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_API_KEY}:${LIVEKIT_API_SECRET}
    networks:
      - corpmeet-dev
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 1G

  livekit-egress:
    image: livekit/egress:latest
    container_name: corpmeet-livekit-egress-dev
    restart: unless-stopped
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yaml
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    volumes:
      - ./infra/livekit/egress.yaml:/etc/egress.yaml:ro
      - ./data/recordings:/out
    networks:
      - corpmeet-dev
    depends_on:
      - livekit
    cap_add:
      - SYS_ADMIN
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  corpmeet-dev:
    driver: bridge
    ipam:
      config:
        - subnet: 172.29.0.0/16
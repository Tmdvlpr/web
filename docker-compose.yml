services:
  db:
    image: postgres:16-alpine
    container_name: corpmeet-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?required}
      POSTGRES_USER: ${POSTGRES_USER:?required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?required}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=C.UTF-8"
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - corpmeet
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  backend:
    build:
      context: ./web/backend
      dockerfile: Dockerfile
    image: corpmeet-backend:latest
    container_name: corpmeet-backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:8050:8001"
    env_file:
      - web/backend/app/.env
    volumes:
      - ./data/chat-files:/app/data/chat-files
      - ./data/recordings:/app/data/recordings:ro
    depends_on:
      db:
        condition: service_healthy
    networks:
      - corpmeet
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/docs"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "2"
          memory: 1G

  frontend:
    build:
      context: ./web/frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:?required}
    image: corpmeet-frontend:latest
    container_name: corpmeet-frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:3050:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - corpmeet
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M

  livekit:
    image: livekit/livekit-server:latest
    container_name: corpmeet-livekit
    restart: unless-stopped
    command: --config /etc/livekit.yaml
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
    ports:
      - "7880:7880"
      - "7881:7881"
      - "50000-50500:50000-50500/udp"
    environment:
      - LIVEKIT_KEYS=${LIVEKIT_API_KEY}:${LIVEKIT_API_SECRET}
    networks:
      - corpmeet
    depends_on:
      - redis
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 4G

  redis:
    image: redis:7-alpine
    container_name: corpmeet-redis
    restart: unless-stopped
    networks:
      - corpmeet
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  livekit-egress:
    image: livekit/egress:latest
    container_name: corpmeet-livekit-egress
    restart: unless-stopped
    environment:
      - EGRESS_CONFIG_FILE=/etc/egress.yaml
      - LIVEKIT_API_KEY=${LIVEKIT_API_KEY}
      - LIVEKIT_API_SECRET=${LIVEKIT_API_SECRET}
    volumes:
      - ./infra/livekit/egress.yaml:/etc/egress.yaml:ro
      - ./data/recordings:/out
    networks:
      - corpmeet
    depends_on:
      - livekit
      - redis
    cap_add:
      - SYS_ADMIN
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: ${PGDATA_PATH:-./pgdata}

networks:
  corpmeet:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16
name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        command_timeout: 30m
        script_stop: true
        script: |
          set -e
          cd /var/www/www-root/data/www/dev.corpmeet.uz
          git config --global --add safe.directory /var/www/www-root/data/www/dev.corpmeet.uz
          git fetch origin main
          git reset --hard origin/main
          echo "=== Deployed commit ==="
          git log --oneline -1
          if [ ! -f backend/app/.env ] && [ -f web/backend/app/.env ]; then
            mkdir -p backend/app
            cp web/backend/app/.env backend/app/.env
          fi
          # Patch stale env values that are gitignored (live on server but not overwritten by git)
          if [ -f backend/app/.env ]; then
            sed -i 's|LIVEKIT_PUBLIC_URL=.*|LIVEKIT_PUBLIC_URL=wss://dev.corpmeet.uz/lk|' backend/app/.env
            sed -i 's|FRONTEND_URL=.*|FRONTEND_URL=https://dev.corpmeet.uz|' backend/app/.env
          fi
          # Remove any lingering containers with old hardcoded names that block project-scoped startup
          docker rm -f corpmeet-db corpmeet-backend corpmeet-frontend corpmeet-nginx-dev corpmeet-redis-dev 2>/dev/null || true
          BUST=$(git rev-parse HEAD)
          docker compose build --build-arg CACHEBUST=$BUST frontend
          docker compose build --build-arg CACHEBUST=$BUST backend
          docker compose up -d --remove-orphans --force-recreate
          sleep 5
          echo "=== Container status ==="
          docker compose ps

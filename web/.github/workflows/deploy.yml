name: Deploy to Server

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script_stop: true
        script: |
          set -e
          cd /var/www/www-root/data/www/corpmeet.uz
          git config --global --add safe.directory /var/www/www-root/data/www/corpmeet.uz
          git fetch origin main
          git reset --hard origin/main
          echo "=== Deployed commit ==="
          git log --oneline -1
          if [ ! -f backend/app/.env ] && [ -f web/backend/app/.env ]; then
            mkdir -p backend/app
            cp web/backend/app/.env backend/app/.env
          fi
          docker compose build --no-cache frontend
          docker compose build --no-cache backend
          docker compose up -d --remove-orphans --force-recreate
          sleep 5
          echo "=== Container status ==="
          docker compose ps

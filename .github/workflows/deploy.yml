name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script_stop: true
        script: |
          set -e
          cd /var/www/www-root/data/www/dev.corpmeet.uz
          git config --global --add safe.directory /var/www/www-root/data/www/dev.corpmeet.uz
          git fetch origin main
          git reset --hard origin/main
          # Strip Windows CRLF from root .env to avoid \r in passwords
          sed -i 's/\r//' .env
          # Extract clean pg credentials
          _PG_USER=$(sed -n 's/^POSTGRES_USER=//p' .env)
          _PG_PASS=$(sed -n 's/^POSTGRES_PASSWORD=//p' .env)
          _PG_DB=$(sed -n 's/^POSTGRES_DB=//p' .env)
          PGDATA_PATH=$(sed -n 's/^PGDATA_PATH=//p' .env)
          # Remove DATABASE_URL from env_file so shell env takes full control
          if [ -f web/backend/app/.env ]; then
            sed -i 's/\r//' web/backend/app/.env
            sed -i '/^DATABASE_URL=/d' web/backend/app/.env
          fi
          docker compose down --remove-orphans 2>/dev/null || true
          docker rm -f corpmeet-db corpmeet-backend corpmeet-frontend corpmeet-livekit corpmeet-redis corpmeet-livekit-egress 2>/dev/null || true
          # Reset pgdata so postgres re-initializes with clean password
          rm -rf ${PGDATA_PATH:-./pgdata}
          mkdir -p ${PGDATA_PATH:-./pgdata}
          docker network prune -f 2>/dev/null || true
          # Force DATABASE_URL via shell env — highest Docker Compose priority
          export DATABASE_URL="postgresql+asyncpg://${_PG_USER}:${_PG_PASS}@db:5432/${_PG_DB}"
          docker compose build
          docker compose up -d --remove-orphans || (echo "=== BACKEND LOGS ===" && docker logs corpmeet-backend 2>&1 | tail -50 && exit 1)
          sleep 5
          docker compose ps

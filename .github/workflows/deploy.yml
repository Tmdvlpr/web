name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script_stop: true
        script: |
          set -e
          cd /var/www/www-root/data/www/dev.corpmeet.uz
          git config --global --add safe.directory /var/www/www-root/data/www/dev.corpmeet.uz
          git fetch origin main
          git reset --hard origin/main
          # Strip CRLF from root .env (tr is more portable than sed \r)
          tr -d '\r' < .env > .env.tmp && mv .env.tmp .env
          # Extract clean pg credentials
          _PG_USER=$(grep '^POSTGRES_USER=' .env | cut -d= -f2-)
          _PG_PASS=$(grep '^POSTGRES_PASSWORD=' .env | cut -d= -f2-)
          _PG_DB=$(grep '^POSTGRES_DB=' .env | cut -d= -f2-)
          PGDATA_PATH=$(grep '^PGDATA_PATH=' .env | cut -d= -f2-)
          echo "=== PG: user=$_PG_USER db=$_PG_DB pgdata=${PGDATA_PATH:-./pgdata} ==="
          # Write correct DATABASE_URL directly into backend env_file
          touch web/backend/app/.env
          tr -d '\r' < web/backend/app/.env > web/backend/app/.env.tmp && mv web/backend/app/.env.tmp web/backend/app/.env
          sed -i '/^DATABASE_URL=/d' web/backend/app/.env
          echo "DATABASE_URL=postgresql+asyncpg://${_PG_USER}:${_PG_PASS}@db:5432/${_PG_DB}" >> web/backend/app/.env
          echo "=== Written DATABASE_URL → db:5432 ==="
          docker compose down --remove-orphans 2>/dev/null || true
          docker rm -f corpmeet-db corpmeet-backend corpmeet-frontend corpmeet-livekit corpmeet-redis corpmeet-livekit-egress 2>/dev/null || true
          # Reset pgdata so postgres re-initializes with clean password
          rm -rf ${PGDATA_PATH:-./pgdata}
          mkdir -p ${PGDATA_PATH:-./pgdata}
          docker network prune -f 2>/dev/null || true
          docker compose build
          docker compose up -d --remove-orphans || (echo "=== BACKEND LOGS ===" && docker logs corpmeet-backend 2>&1 | tail -50 && echo "=== CONTAINER ENV ===" && docker inspect corpmeet-backend --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep -i database || true && exit 1)
          sleep 5
          docker compose ps

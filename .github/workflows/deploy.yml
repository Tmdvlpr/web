name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script_stop: true
        script: |
          set -e
          cd /var/www/www-root/data/www/dev.corpmeet.uz
          git config --global --add safe.directory /var/www/www-root/data/www/dev.corpmeet.uz
          git fetch origin main
          git reset --hard origin/main
          if [ ! -f backend/app/.env ] && [ -f web/backend/app/.env ]; then
            mkdir -p backend/app
            cp web/backend/app/.env backend/app/.env
          fi
          # Patch DATABASE_URL in backend .env to use Docker-internal host (db:5432)
          if [ -f .env ] && [ -f web/backend/app/.env ]; then
            _PG_USER=$(sed -n 's/^POSTGRES_USER=//p' .env | tr -d '\r')
            _PG_PASS=$(sed -n 's/^POSTGRES_PASSWORD=//p' .env | tr -d '\r')
            _PG_DB=$(sed -n 's/^POSTGRES_DB=//p' .env | tr -d '\r')
            sed -i "s|^DATABASE_URL=.*|DATABASE_URL=postgresql+asyncpg://${_PG_USER}:${_PG_PASS}@db:5432/${_PG_DB}|" web/backend/app/.env
            echo "=== PATCHED .env DATABASE_URL ===" && grep "^DATABASE_URL=" web/backend/app/.env | sed 's/:.*@/:***@/' || true
          fi
          # Also load PGDATA_PATH for use below
          if [ -f .env ]; then PGDATA_PATH=$(sed -n 's/^PGDATA_PATH=//p' .env | tr -d '\r'); fi
          docker compose down --remove-orphans 2>/dev/null || true
          docker rm -f corpmeet-db corpmeet-backend corpmeet-frontend corpmeet-livekit corpmeet-redis corpmeet-livekit-egress 2>/dev/null || true
          rm -rf ${PGDATA_PATH:-./pgdata}
          mkdir -p ${PGDATA_PATH:-./pgdata}
          docker network prune -f 2>/dev/null || true
          docker compose build
          echo "=== COMPOSE DATABASE_URL ===" && docker compose config 2>&1 | grep -A1 DATABASE_URL || true
          docker compose up -d --remove-orphans || (echo "=== BACKEND LOGS (head) ===" && docker logs corpmeet-backend 2>&1 | head -30 && echo "=== BACKEND LOGS (tail) ===" && docker logs corpmeet-backend 2>&1 | tail -30 && echo "=== CONTAINER ENV ===" && docker inspect corpmeet-backend --format '{{range .Config.Env}}{{println .}}{{end}}' 2>/dev/null | grep DATABASE_URL || true && exit 1)
          sleep 5
          docker compose ps

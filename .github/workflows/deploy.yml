# .github/workflows/deploy.yml ichini shu bilan almashtir:

name: Deploy to Server

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.SSH_HOST }}
        username: ${{ secrets.SSH_USER }}
        key: ${{ secrets.SSH_KEY }}
        script_stop: true
        script: |
          set -e
          cd /var/www/www-root/data/www/corpmeet.uz
          git config --global --add safe.directory /var/www/www-root/data/www/corpmeet.uz
          git fetch origin main
          git reset --hard origin/main
          docker compose build
          docker compose up -d --remove-orphans
          sleep 5
          docker compose ps
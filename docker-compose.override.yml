services:
  backend:
    depends_on: {}
    environment:
      DB_SCHEMA: "video"
      LIVEKIT_PUBLIC_URL: "wss://corpmeet.uz/lk"
      FRONTEND_URL: "https://corpmeet.uz"

  livekit:
    volumes:
      - ./infra/livekit/livekit.yaml:/etc/livekit.yaml:ro
    environment:
      LIVEKIT_KEYS: "${LIVEKIT_API_KEY}: ${LIVEKIT_API_SECRET}"

  frontend:
    build:
      args:
        VITE_API_URL: ""
        VITE_DEV_LOGIN: "true"

  redis:
    image: redis:7-alpine
    container_name: corpmeet-redis
    restart: unless-stopped
    networks:
      - corpmeet